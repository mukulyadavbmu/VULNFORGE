<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2128"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B84B"/>
      <stop offset="50%" style="stop-color:#D29922"/>
      <stop offset="100%" style="stop-color:#B8820F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="6" ry="6" fill="none" stroke="#D29922" stroke-width="0.5" opacity="0.4"/>
  <!-- VF text -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="14"
    fill="url(#gold)"
    filter="url(#glow)"
    letter-spacing="-0.5"
  >VF</text>
</svg>
